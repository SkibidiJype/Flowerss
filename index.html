<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flowes for you ante meya</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --petal-1: #ff6b9d;
      --petal-2: #c44569;
      --petal-3: #f8b500;
      --center: #fff5e6;
      --glow: rgba(255, 120, 180, 0.55);
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      font-family: system-ui, sans-serif;
      cursor: crosshair;
    }

    .scene {
      position: fixed;
      inset: 0;
      background: #0a0612;
    }

    .aurora {
      position: absolute;
      inset: -20%;
      will-change: transform;
    }

    .aurora-blob {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 20% 40%, rgba(139, 92, 246, 0.35), transparent 55%),
        radial-gradient(ellipse 70% 60% at 80% 60%, rgba(236, 72, 153, 0.28), transparent 50%),
        radial-gradient(ellipse 60% 40% at 50% 100%, rgba(34, 211, 238, 0.12), transparent 45%),
        radial-gradient(circle at 50% 50%, #1a0a2e 0%, #0a0612 70%);
      animation: auroraShift 14s ease-in-out 0.6s infinite alternate;
      will-change: transform, filter;
    }

    @keyframes auroraShift {
      0% {
        transform: translate(0, 0) scale(1);
        filter: hue-rotate(0deg) brightness(1);
      }
      100% {
        transform: translate(2%, -3%) scale(1.08);
        filter: hue-rotate(25deg) brightness(1.05);
      }
    }

    .vignette {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 45%, transparent 0%, rgba(0, 0, 0, 0.55) 100%);
      pointer-events: none;
    }

    #particles {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    .bouquet-wrap {
      position: absolute;
      left: 50%;
      top: calc(50% + min(5rem, 11vh));
      z-index: 4;
      width: min(92vmin, 640px);
      height: min(92vmin, 640px);
      transform: translate(-50%, -50%);
      pointer-events: none;
      will-change: transform;
    }

    .tulip-ring {
      position: absolute;
      inset: 0;
      z-index: 0;
      overflow: visible;
      opacity: 0.98;
    }

    .tulip-ring-svg {
      width: 100%;
      height: 100%;
      display: block;
      overflow: visible;
      pointer-events: none;
    }

    .tulip-sync-ring {
      transform-origin: 256px 256px;
      animation: wholeSway 8s ease-in-out 0.6s infinite;
    }

    .tulip-cluster-wiggle {
      transform-origin: 256px 452px;
      animation: tulipClusterDrift 8.5s ease-in-out 0.6s infinite;
    }

    @keyframes tulipClusterDrift {
      0%, 100% { transform: translateX(0) translateY(0); }
      33% { transform: translateX(16px) translateY(-7px); }
      66% { transform: translateX(-14px) translateY(5px); }
    }

    .tulip-bob {
      transform-box: fill-box;
      transform-origin: 50% 100%;
      animation: tulipBob 3.4s ease-in-out infinite;
    }

    .tulip-bob--1 { animation-delay: calc(0s + 0.6s); }
    .tulip-bob--2 { animation-delay: calc(0.35s + 0.6s); }
    .tulip-bob--3 { animation-delay: calc(0.7s + 0.6s); }
    .tulip-bob--4 { animation-delay: calc(0.18s + 0.6s); }
    .tulip-bob--5 { animation-delay: calc(0.52s + 0.6s); }
    .tulip-bob--6 { animation-delay: calc(0.88s + 0.6s); }
    .tulip-bob--7 { animation-delay: calc(0.1s + 0.6s); }
    .tulip-bob--8 { animation-delay: calc(0.62s + 0.6s); }

    @keyframes tulipBob {
      0%, 100% { transform: rotate(-3.4deg) translateY(0); }
      50% { transform: rotate(3.6deg) translateY(-10px); }
    }

    .butterfly-v-burst {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      overflow: visible;
      animation: flowerPop 1.15s cubic-bezier(0.34, 1.45, 0.64, 1) 0.68s both;
    }

    .bf-v-sway {
      position: absolute;
      inset: 0;
      animation: wholeSway 8s ease-in-out 1.72s infinite;
      transform-origin: 50% 44%;
    }

    .bf-v {
      position: absolute;
      width: clamp(40px, 7vmin, 72px);
      transform: translate(-50%, -50%);
      filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.4));
    }

    .bf-v-inner {
      width: 100%;
      height: auto;
      animation: bfVFloat 9s ease-in-out infinite;
    }

    .bf-v-inner svg {
      width: 100%;
      height: auto;
      display: block;
      overflow: visible;
    }

    .bf-v-inner--flip {
      animation-name: bfVFloatFlip;
    }

    .bf-v--1 { left: 50%; top: 22%; }
    .bf-v--2 { left: 34%; top: 30%; }
    .bf-v--3 { left: 66%; top: 30%; }
    .bf-v--4 { left: 23%; top: 38%; }
    .bf-v--5 { left: 77%; top: 38%; }
    .bf-v--6 { left: 40%; top: 46%; }
    .bf-v--7 { left: 60%; top: 46%; }

    .bf-v--1 .bf-v-inner { animation-delay: calc(1.12s + 0.6s); }
    .bf-v--2 .bf-v-inner { animation-delay: calc(1.2s + 0.6s); }
    .bf-v--3 .bf-v-inner { animation-delay: calc(1.18s + 0.6s); }
    .bf-v--4 .bf-v-inner { animation-delay: calc(1.26s + 0.6s); }
    .bf-v--5 .bf-v-inner { animation-delay: calc(1.22s + 0.6s); }
    .bf-v--6 .bf-v-inner { animation-delay: calc(1.3s + 0.6s); }
    .bf-v--7 .bf-v-inner { animation-delay: calc(1.32s + 0.6s); }

    @keyframes bfVFloat {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(5px, -8px); }
    }

    @keyframes bfVFloatFlip {
      0%, 100% { transform: scaleX(-1) translate(0, 0); }
      50% { transform: scaleX(-1) translate(-5px, -8px); }
    }

    .bf-wing-l {
      transform-origin: 32px 36px;
      animation: wingBeatL 0.2s ease-in-out infinite alternate;
    }

    .bf-wing-r {
      transform-origin: 32px 36px;
      animation: wingBeatR 0.2s ease-in-out infinite alternate;
      animation-delay: -0.1s;
    }

    @keyframes wingBeatL {
      from { transform: rotate(-40deg); }
      to { transform: rotate(-16deg); }
    }

    @keyframes wingBeatR {
      from { transform: rotate(16deg); }
      to { transform: rotate(40deg); }
    }

    .flower-wrap {
      position: absolute;
      inset: 0;
      z-index: 2;
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 0 40px var(--glow)) drop-shadow(0 0 80px rgba(168, 85, 247, 0.25));
    }

    .flower-svg {
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    .layer-back {
      animation: wholeSway 8s ease-in-out 0.6s infinite;
      transform-origin: 50% 55%;
    }

    .layer-mid {
      animation: wholeSway 8s ease-in-out 0.75s infinite;
      transform-origin: 50% 52%;
    }

    .layer-front {
      animation: wholeSway 8s ease-in-out 0.9s infinite;
      transform-origin: 50% 50%;
    }

    @keyframes wholeSway {
      0%, 100% { transform: rotate(-2deg) scale(1); }
      50% { transform: rotate(2deg) scale(1.02); }
    }

    .petal-outer {
      transform-origin: 256px 256px;
      animation: petalPulse 5s ease-in-out infinite;
    }

    .layer-back > g:nth-child(2) > g:nth-child(1) .petal-outer { animation-delay: calc(0s + 0.6s); }
    .layer-back > g:nth-child(2) > g:nth-child(2) .petal-outer { animation-delay: calc(0.15s + 0.6s); }
    .layer-back > g:nth-child(2) > g:nth-child(3) .petal-outer { animation-delay: calc(0.3s + 0.6s); }
    .layer-back > g:nth-child(2) > g:nth-child(4) .petal-outer { animation-delay: calc(0.45s + 0.6s); }
    .layer-back > g:nth-child(2) > g:nth-child(5) .petal-outer { animation-delay: calc(0.6s + 0.6s); }
    .layer-back > g:nth-child(2) > g:nth-child(6) .petal-outer { animation-delay: calc(0.75s + 0.6s); }
    .layer-back > g:nth-child(2) > g:nth-child(7) .petal-outer { animation-delay: calc(0.9s + 0.6s); }
    .layer-back > g:nth-child(2) > g:nth-child(8) .petal-outer { animation-delay: calc(1.05s + 0.6s); }

    @keyframes petalPulse {
      0%, 100% {
        transform: scaleY(1) scaleX(1);
        opacity: 0.92;
      }
      50% {
        transform: scaleY(1.08) scaleX(1.04);
        opacity: 1;
      }
    }

    .petal-inner {
      transform-box: fill-box;
      transform-origin: center center;
      animation: innerFlutter 4s ease-in-out infinite;
    }

    .layer-mid > g:nth-child(1) .petal-inner { animation-delay: calc(0.1s + 0.6s); }
    .layer-mid > g:nth-child(2) .petal-inner { animation-delay: calc(0.25s + 0.6s); }
    .layer-mid > g:nth-child(3) .petal-inner { animation-delay: calc(0.4s + 0.6s); }
    .layer-mid > g:nth-child(4) .petal-inner { animation-delay: calc(0.55s + 0.6s); }
    .layer-mid > g:nth-child(5) .petal-inner { animation-delay: calc(0.7s + 0.6s); }
    .layer-mid > g:nth-child(6) .petal-inner { animation-delay: calc(0.85s + 0.6s); }

    @keyframes innerFlutter {
      0%, 100% {
        transform: rotate(0deg) scale(1);
      }
      50% {
        transform: rotate(4deg) scale(1.06);
      }
    }

    .flower-center {
      transform-origin: 256px 256px;
      animation: centerBreathe 3.5s ease-in-out 0.6s infinite;
    }

    @keyframes centerBreathe {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.06); }
    }

    .stamen-group {
      transform-origin: 256px 248px;
      animation: stamenTwist 6s ease-in-out 0.6s infinite;
    }

    @keyframes stamenTwist {
      0%, 100% { transform: rotate(0deg); }
      50% { transform: rotate(8deg); }
    }

    .sparkle-ring {
      transform-origin: 256px 256px;
      animation: ringSpin 20s linear 0.6s infinite;
      opacity: 0.45;
    }

    @keyframes ringSpin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .hint {
      position: fixed;
      bottom: 1.25rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      color: rgba(255, 255, 255, 0.35);
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      pointer-events: none;
    }

    .flower-bloom {
      width: 100%;
      height: 100%;
      animation: flowerPop 1.15s cubic-bezier(0.34, 1.45, 0.64, 1) 0.68s both;
    }

    @keyframes flowerPop {
      from {
        opacity: 0;
        transform: scale(0) rotate(-14deg);
      }
      to {
        opacity: 1;
        transform: scale(1) rotate(0deg);
      }
    }

    .popup-layer {
      position: fixed;
      inset: 0;
      z-index: 5;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: max(1.1rem, env(safe-area-inset-top) + 0.35rem) 1.25rem 1rem;
      pointer-events: none;
    }

    .popup-track {
      display: flex;
      justify-content: center;
      width: 100%;
      will-change: transform;
    }

    .popup-sway-sync {
      animation: wholeSway 8s ease-in-out 0.6s infinite;
      transform-origin: center top;
      margin-top: clamp(0.25rem, 2vh, 1rem);
    }

    .popup-card {
      position: relative;
      max-width: min(32rem, 92vw);
      padding: clamp(0.85rem, 3vw, 1.35rem) clamp(1.25rem, 4vw, 2rem);
      text-align: center;
      background: linear-gradient(155deg, rgba(255, 255, 255, 0.14), rgba(255, 140, 200, 0.08));
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 1.35rem;
      box-shadow:
        0 28px 70px rgba(0, 0, 0, 0.4),
        0 0 50px rgba(236, 72, 153, 0.18),
        inset 0 1px 0 rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      opacity: 0;
      transform: scale(0.72) translateY(-1.25rem);
      animation: cardPop 1s cubic-bezier(0.34, 1.4, 0.64, 1) 0.92s forwards,
        popupGlowPulse 8s ease-in-out 1.85s infinite;
    }

    @keyframes cardPop {
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    @keyframes popupGlowPulse {
      0%, 100% {
        box-shadow:
          0 28px 70px rgba(0, 0, 0, 0.4),
          0 0 42px rgba(236, 72, 153, 0.16),
          inset 0 1px 0 rgba(255, 255, 255, 0.2);
      }
      50% {
        box-shadow:
          0 28px 70px rgba(0, 0, 0, 0.4),
          0 0 72px rgba(244, 114, 182, 0.35),
          inset 0 1px 0 rgba(255, 255, 255, 0.28);
      }
    }

    .popup-line {
      margin: 0;
      font-size: clamp(0.95rem, 3.8vw, 1.2rem);
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255, 252, 254, 0.96);
      line-height: 1.75;
    }

    .popup-line--accent {
      margin-top: 0.5rem;
      font-size: clamp(1.2rem, 5.2vw, 1.75rem);
      letter-spacing: 0.22em;
      line-height: 1.5;
    }

    .popup-line--accent .w {
      background: linear-gradient(105deg, #ffe8c8, #ff9ec4 40%, #f0abfc 75%, #c4b5fd);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
    }

    .popup-line .w {
      display: inline-block;
      margin: 0 0.15em;
      opacity: 0;
      transform: translateY(0.75em) scale(0.92);
      animation: wordReveal 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    @keyframes wordReveal {
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .popup-line:nth-child(2) .w:nth-child(1) { animation-delay: calc(0.52s + 0.6s); }
    .popup-line:nth-child(2) .w:nth-child(2) { animation-delay: calc(0.62s + 0.6s); }
    .popup-line:nth-child(2) .w:nth-child(3) { animation-delay: calc(0.72s + 0.6s); }
    .popup-line:nth-child(3) .w:nth-child(1) { animation-delay: calc(0.88s + 0.6s); }
    .popup-line:nth-child(3) .w:nth-child(2) { animation-delay: calc(0.98s + 0.6s); }

    .popup-shine {
      position: absolute;
      top: 0;
      left: -60%;
      width: 55%;
      height: 100%;
      background: linear-gradient(100deg, transparent, rgba(255, 255, 255, 0.14), transparent);
      transform: skewX(-18deg);
      animation: shineLoop 5s ease-in-out 0.6s infinite;
      opacity: 0;
      pointer-events: none;
    }

    @keyframes shineLoop {
      0%, 8% {
        opacity: 0;
        left: -55%;
      }
      18% { opacity: 1; }
      35% {
        opacity: 0;
        left: 105%;
      }
      100% {
        opacity: 0;
        left: 105%;
      }
    }
  </style>
</head>

  <script>
    (function () {
      const canvas = document.getElementById('particles');
      const ctx = canvas.getContext('2d');
      const aurora = document.getElementById('aurora');
      const bouquetWrap = document.getElementById('bouquetWrap');
      const popupTrack = document.getElementById('popupTrack');

      let w = 0;
      let h = 0;
      let mx = 0.5;
      let my = 0.5;
      let targetMx = 0.5;
      let targetMy = 0.5;

      const pollen = [];
      const sparks = [];
      // Reduced counts for smoother mobile performance
      const POLLEN_COUNT = 55;
      const SPARK_COUNT = 38;

      function resize() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
      }

      function rand(a, b) {
        return a + Math.random() * (b - a);
      }

      function flowerNudgeY(viewH) {
        const rem = parseFloat(getComputedStyle(document.documentElement).fontSize) || 16;
        return Math.min(5 * rem, viewH * 0.11);
      }

      function initParticles() {
        pollen.length = 0;
        sparks.length = 0;
        for (let i = 0; i < POLLEN_COUNT; i++) {
          pollen.push({
            x: rand(0, w),
            y: rand(0, h),
            r: rand(0.6, 2.4),
            vx: rand(-0.35, 0.35),
            vy: rand(-0.55, -0.15),
            a: rand(0.2, 0.75),
            hue: rand(300, 340),
          });
        }
        for (let i = 0; i < SPARK_COUNT; i++) {
          sparks.push({
            cx: w * 0.5,
            cy: h * 0.5 + flowerNudgeY(h),
            angle: rand(0, Math.PI * 2),
            dist: rand(80, Math.min(w, h) * 0.42),
            speed: rand(0.0004, 0.0012),
            phase: rand(0, Math.PI * 2),
            size: rand(1, 3),
          });
        }
      }

      window.addEventListener('resize', () => {
        resize();
        initParticles();
      });

      resize();
      initParticles();

      window.addEventListener('mousemove', (e) => {
        targetMx = e.clientX / w;
        targetMy = e.clientY / h;
      });

      window.addEventListener('touchmove', (e) => {
        if (e.touches[0]) {
          targetMx = e.touches[0].clientX / w;
          targetMy = e.touches[0].clientY / h;
        }
      }, { passive: true });

      function tick() {
        mx += (targetMx - mx) * 0.06;
        my += (targetMy - my) * 0.06;

        const px = (mx - 0.5) * 28;
        const py = (my - 0.5) * 28;
        bouquetWrap.style.transform =
          `translate(calc(-50% + ${px}px), calc(-50% + ${py}px)) rotate(${(mx - 0.5) * 4}deg)`;

        const ppx = px * 0.52;
        const ppy = py * 0.38;
        popupTrack.style.transform =
          `translate(${ppx}px, ${ppy}px) rotate(${(mx - 0.5) * 2.8}deg)`;

        aurora.style.transform =
          `translate(${(0.5 - mx) * 18}px, ${(0.5 - my) * 14}px) scale(1.02)`;

        ctx.clearRect(0, 0, w, h);

        const cx = w * 0.5 + (mx - 0.5) * 40;
        const cy = h * 0.5 + flowerNudgeY(h) + (my - 0.5) * 30;

        for (const p of pollen) {
          p.x += p.vx + (mx - 0.5) * 0.4;
          p.y += p.vy;
          p.a += Math.sin(Date.now() * 0.001 + p.x * 0.01) * 0.01;
          if (p.y < -10) {
            p.y = h + 10;
            p.x = rand(0, w);
          }
          if (p.x < -20) p.x = w + 20;
          if (p.x > w + 20) p.x = -20;
          ctx.fillStyle = `hsla(${p.hue}, 85%, 72%, ${Math.max(0.1, Math.min(0.9, p.a))})`;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fill();
        }

        const t = Date.now() * 0.001;
        for (const s of sparks) {
          s.phase += s.speed * (1 + Math.sin(t) * 0.2);
          const orbit = s.dist * (0.92 + Math.sin(s.phase * 3 + s.angle) * 0.08);
          const sx = cx + Math.cos(s.angle + s.phase * 2.2) * orbit;
          const sy = cy + Math.sin(s.angle + s.phase * 1.7) * orbit * 0.88;

          const alpha = 0.25 + Math.sin(s.phase * 4) * 0.2;
          const grd = ctx.createRadialGradient(sx, sy, 0, sx, sy, s.size * 4);
          grd.addColorStop(0, `rgba(255, 240, 200, ${alpha})`);
          grd.addColorStop(0.4, `rgba(255, 182, 220, ${alpha * 0.45})`);
          grd.addColorStop(1, 'rgba(255, 182, 220, 0)');
          ctx.fillStyle = grd;
          ctx.beginPath();
          ctx.arc(sx, sy, s.size * 4, 0, Math.PI * 2);
          ctx.fill();
        }

        requestAnimationFrame(tick);
      }

      requestAnimationFrame(tick);
    })();
  </script>
